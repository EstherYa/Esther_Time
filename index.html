
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Esther Time</title>
  <meta name="description" content="Esther Time，实时显示北京时间 UTC+8" />
  <style>
    :root {
      --bg1: #041122;
      --bg2: #0b1f42;
      --bg3: #173666;
      --card-border: rgba(255, 255, 255, 0.16);
      --text: #f7fbff;
      --muted: rgba(247, 251, 255, 0.80);
      --muted-small: rgba(247, 251, 255, 0.72);
      --accent: #f3d274;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.08), transparent 24%),
        radial-gradient(circle at 85% 15%, rgba(78, 140, 255, 0.18), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(243, 210, 116, 0.07), transparent 30%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .wrap {
      width: min(860px, 100%);
    }

    .card {
      text-align: center;
      padding: clamp(36px, 7vw, 70px) clamp(28px, 6vw, 64px);
      border: 1px solid var(--card-border);
      border-radius: 34px;
      background: linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.08));
      box-shadow: 0 30px 90px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(34px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .time {
      margin: 0;
      font-variant-numeric: tabular-nums;
      font-size: clamp(58px, 15vw, 150px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: 0.03em;
      color: var(--accent);
      text-shadow: 0 12px 34px rgba(243, 210, 116, 0.22);
    }

    .date {
      margin-top: 26px;
      color: var(--muted);
      font-size: clamp(18px, 3.4vw, 28px);
      letter-spacing: 0.03em;
      line-height: 1.45;
    }

    .status {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: var(--muted-small);
      font-size: clamp(13px, 2.1vw, 18px);
      letter-spacing: 0.03em;
      line-height: 1.4;
    }

    .live-dot {
      color: #61e38a;
      text-shadow: 0 0 12px rgba(97, 227, 138, 0.95);
    }

    @media (max-width: 520px) {
      .card { border-radius: 28px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card" aria-label="Esther Time 实时显示">
      <h1>Esther Time</h1>
      <div id="time" class="time">--:--:--</div>
      <div id="date" class="date">0000.00.00 · Monday</div>
      <div class="status"><span class="live-dot">●</span> Live · Beijing UTC+8</div>
    </section>
  </main>

  <script>
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');

    const timeFormatter = new Intl.DateTimeFormat('en-GB', {
      timeZone: 'Asia/Shanghai',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: false
    });

    const weekdayFormatter = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Shanghai',
      weekday: 'long'
    });

    function getShanghaiParts(date) {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit'
      }).formatToParts(date);

      const out = {};
      for (const p of parts) {
        if (p.type !== 'literal') out[p.type] = p.value;
      }
      return out;
    }

    function updateClock() {
      const now = new Date();
      const { year, month, day } = getShanghaiParts(now);
      const weekday = weekdayFormatter.format(now);
      timeEl.textContent = timeFormatter.format(now);
      dateEl.textContent = `${year}.${month}.${day} · ${weekday}`;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
